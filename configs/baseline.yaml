# DDPO Baseline — A100 40GB configuration
# Reproduces diversity collapse on SD 1.5 with PickScore reward.

model:
  sd_model_id: runwayml/stable-diffusion-v1-5
  lora_rank: 4
  lora_alpha: 4
  dtype: bfloat16  # use float16 if GPU lacks bf16 support

sampling:
  num_inference_steps: 50
  ddim_eta: 1.0
  image_size: 512
  guidance_scale: 1.0  # no CFG during training

training:
  num_train_steps: 500
  num_prompts_per_iter: 8
  samples_per_prompt: 4
  inner_epochs: 1
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  clip_range: 0.1
  advantage_clip: 5.0
  max_grad_norm: 0.5
  grad_accumulation_steps: 10

evaluation:
  eval_every: 25
  n_samples_per_eval_prompt: 50
  n_samples_per_eval_prompt_intrain: 8

logging:
  use_wandb: true
  wandb_project: ddpo-baseline
  log_every: 1
  output_dir: outputs/baseline

checkpoint:
  save_every_eval: true
  save_dir: checkpoints/baseline
