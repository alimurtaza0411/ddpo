# Multi-objective DDPO — HIGH diversity weight ablation.
# Same as multi_objective_a100.yaml except weights.diversity = 1.0 (was 0.5)
# and num_train_steps = 250. Goal: produce a third Pareto point so the
# trade-off curve has a shape rather than two endpoints.

model:
  sd_model_id: runwayml/stable-diffusion-v1-5
  lora_rank: 4
  lora_alpha: 4
  dtype: float16

sampling:
  num_inference_steps: 50
  ddim_eta: 1.0
  image_size: 512
  guidance_scale: 1.0

reward:
  type: multi_objective
  normalize_components: true
  diversity_metric: clip
  weights:
    preference: 1.0
    faithfulness: 0.25
    diversity: 1.0  # doubled vs the main multi-objective run
    image_reward: 0.0
  kl_beta: 0.001
  kl_mode: squared_logprob

training:
  num_train_steps: 250  # shorter to fit ablation budget; baseline already shows trend by step 250
  num_prompts_per_iter: 4  # halved for L4 24GB
  samples_per_prompt: 4
  inner_epochs: 1
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  clip_range: 0.1
  advantage_clip: 5.0
  max_grad_norm: 0.5
  grad_accumulation_steps: 10
  warmup_steps: 50

evaluation:
  eval_every: 25
  n_samples_per_eval_prompt: 100
  n_samples_per_eval_prompt_intrain: 16

logging:
  use_wandb: true
  wandb_project: ddpo-final-runs
  log_every: 5
  output_dir: outputs/high_div_l4_run1

checkpoint:
  save_every_eval: true
  save_dir: outputs/high_div_l4_run1/checkpoints
