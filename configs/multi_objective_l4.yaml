# DDPO Multi-objective — GCP L4 24GB configuration (run 2).

model:
  sd_model_id: runwayml/stable-diffusion-v1-5
  lora_rank: 4
  lora_alpha: 4
  dtype: float16

sampling:
  num_inference_steps: 50
  ddim_eta: 1.0
  image_size: 512
  guidance_scale: 1.0

reward:
  type: multi_objective
  normalize_components: true
  diversity_metric: clip
  weights:
    preference: 1.0
    faithfulness: 0.25
    diversity: 0.50
    image_reward: 0.0
  kl_beta: 0.001
  kl_mode: squared_logprob

training:
  num_train_steps: 500
  # L4 24GB requires shrinking the rollout batch from 32 to 16. We keep
  # samples_per_prompt at 4 (not 2) because the CLIP diversity reward computes
  # same-prompt novelty — with only 2 samples per prompt it becomes a noisy
  # pairwise estimate. Instead we halve num_prompts_per_iter (8 → 4).
  num_prompts_per_iter: 4
  samples_per_prompt: 4
  inner_epochs: 1
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  clip_range: 0.1
  advantage_clip: 5.0
  max_grad_norm: 0.5
  grad_accumulation_steps: 10
  warmup_steps: 50

evaluation:
  eval_every: 25
  n_samples_per_eval_prompt: 100
  n_samples_per_eval_prompt_intrain: 16

logging:
  use_wandb: true
  wandb_project: ddpo-final-runs
  log_every: 5
  output_dir: outputs/multi_objective_l4_run2

checkpoint:
  save_every_eval: true
  save_dir: outputs/multi_objective_l4_run2/checkpoints
