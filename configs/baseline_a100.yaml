# DDPO Baseline — Google Colab A100 40GB configuration
# Uses bfloat16 (native A100 support), Drive-based output paths.
# Designed for use with notebooks/train_on_colab.ipynb.

model:
  sd_model_id: runwayml/stable-diffusion-v1-5
  lora_rank: 4
  lora_alpha: 4
  dtype: bfloat16  # A100 native; better numerical range than fp16

sampling:
  num_inference_steps: 50
  ddim_eta: 1.0
  image_size: 512
  guidance_scale: 1.0

training:
  num_train_steps: 500
  num_prompts_per_iter: 8
  samples_per_prompt: 4
  inner_epochs: 1
  learning_rate: 1.0e-4
  weight_decay: 1.0e-4
  clip_range: 0.1
  advantage_clip: 5.0
  max_grad_norm: 0.5
  grad_accumulation_steps: 10
  warmup_steps: 50  # linear LR warmup over first 50 iters; smooths early reward curve

evaluation:
  eval_every: 25
  n_samples_per_eval_prompt: 100  # final-step eval; 100 reduces table noise on the small PickScore deltas
  n_samples_per_eval_prompt_intrain: 16  # was 8; halves CLIP-variance estimator noise

logging:
  use_wandb: true
  wandb_project: ddpo-final-runs
  log_every: 5
  output_dir: /content/drive/MyDrive/ddpo_baseline/run2

checkpoint:
  save_every_eval: true
  save_dir: /content/drive/MyDrive/ddpo_baseline/run2/checkpoints
